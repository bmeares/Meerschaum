<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meerschaum Shell</title>
<style>
  html, body {
    background: #000;
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  #xterm-div {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 5px;
    box-sizing: border-box;
    overflow: hidden;
  }
</style>
<link rel="stylesheet" href="{{ static('css/xterm.css') }}"/>
</head>
<body>
<div id="xterm-div"></div>
<script src="{{ static('js/xterm.js') }}" defer></script>
<script src="{{ static('js/xterm-addon-unicode11.js') }}" defer></script>
<script src="{{ static('js/terminado.js') }}" defer></script>
<script>
window.addEventListener(
  "message",
  (event) => {
    if (!event.isTrusted){ return; }
    if (!window.terminal || !window.terminal.socket) { return; }

    let action_str = event.data.action;
    let subaction_str = event.data['subaction'] ? event.data['subaction'] : '';
    let subaction_text = event.data['subaction_text'] ? event.data['subaction_text'] : '';
    if (subaction_str.length > 0){
        action_str += ' ' + subaction_str;
    }
    if (subaction_text.length > 0){
        action_str += ' ' + subaction_text;
    }

    let connector_keys = event.data['connector_keys'] ? event.data['connector_keys'] : [];
    let metric_keys = event.data['metric_keys'] ? event.data['metric_keys'] : [];
    let location_keys = event.data['location_keys'] ? event.data['location_keys'] : [];
    let tags = event.data['tags'] ? event.data['tags'] : [];
    let connector_keys_str = " -c";
    for (let ck of connector_keys){
        if (typeof ck === "string"){
            let quote_str = ck.includes(" ") ? "'" : "";
            connector_keys_str += " " + quote_str + ck + quote_str;
        }
    }
    if (connector_keys_str === " -c"){
        connector_keys_str = "";
    }
    let metric_keys_str = " -m";
    for (mk of metric_keys){
        if (typeof mk === "string"){
            let quote_str = mk.includes(" ") ? "'" : "";
            metric_keys_str += " " + quote_str + mk + quote_str;
        }
    }
    if (metric_keys_str === " -m"){
        metric_keys_str = "";
    }
    let location_keys_str = " -l";
    for (lk of location_keys){
        if (typeof lk === "string"){
            quote_str = lk.includes(" ") ? "'" : "";
            location_keys_str += " " + quote_str + lk + quote_str;
        } else if (lk === null) {
            location_keys_str += " None";
        }
    }
    if (location_keys_str === " -l"){
        location_keys_str = "";
    }
    let tags_str = " -t";
    for (tag of tags){
        if (typeof tag === "string"){
            quote_str = tag.includes(" ") ? "'" : "";
            tags_str += " " + quote_str + tag + quote_str;
        }
    }
    if (tags_str === " -t"){
        tags_str = "";
    }

    let instance = event.data['instance'] ? event.data['instance'] : '';
    let flags_str = "";
    if (instance.length > 0){
        flags_str += " -i " + instance;
    }
    let flags = event.data['flags'] ? event.data['flags'] : [];
    for (fl of flags){
        if (typeof fl === "string"){
            flags_str += " " + fl;
        }
    }
    // NOTE: Input flags are not quoted to allow for multiple arguments.
    let input_flags = event.data['input_flags'] ? event.data['input_flags'] : [];
    for (const [index, fl] of input_flags.entries()){
        if (!fl){ continue; }
        fl_val = event.data['input_flags_texts'][index];
        if (!fl_val){ continue; }
        if (fl_val.includes(' ')){
          fl_val = "'" + fl_val + "'";
        }
        flags_str += " " + fl + " " + fl_val;
    }

    let line = "";
    if (action_str === "__TMUX_NEW_WINDOW") {
      line = "\x02:";
      window.terminal.socket.send(JSON.stringify(["stdin", line]));
      line = "new-window python3 -m meerschaum";
      if (instance.length > 0) {
          line += " -i " + instance;
      }
      line += "\r"
      window.terminal.socket.send(JSON.stringify(["stdin", line]));
      return;
    }

    line = (
      "\x03"
      + action_str
      + connector_keys_str
      + metric_keys_str
      + location_keys_str
      + tags_str
      + flags_str
      + '\r'
    );
    window.terminal.socket.send(JSON.stringify(["stdin", line]));
  },
  false,
);

document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
});

let reconnectTimeout;

function cleanUpWebSocket(socket) {
    if (!socket) { return; }
      socket.onopen = null;
      socket.onmessage = null;
      socket.onerror = null;
      socket.onclose = null;

      if (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING) {
          socket.close(1000, "Reconnecting");
      }

      if (reconnectTimeout) {
          clearTimeout(reconnectTimeout);
          reconnectTimeout = null;
      }

      socket = null;
}

document.addEventListener('DOMContentLoaded', function() {
    var protocol = (window.location.protocol.indexOf("https") === 0) ? "wss" : "ws";
    var ws_url = protocol+"://"+window.location.host+ "{{ws_url_path}}";

    var termOptions = {
        fontFamily: '"DejaVu Sans Mono", "Liberation Mono", monospace',
        fontSize: 16,
        lineHeight: 1.2,
        allowProposedApi: true,
        scrollback: 100000,
        cursorBlink: true,
        theme: {
            background: '#000'
        }
    };

    function calculate_size() {
        var lh = termOptions.lineHeight || 1.0;
        var dpr = window.devicePixelRatio || 1.0;
        var measure = document.createElement("span");
        measure.style.fontFamily = termOptions.fontFamily;
        measure.style.fontSize = termOptions.fontSize + "px";
        measure.style.fontKerning = "none";
        measure.style.lineHeight = "normal";
        measure.style.display = "inline-block";
        measure.style.position = "absolute";
        measure.style.visibility = "hidden";
        measure.style.whiteSpace = "pre";
        measure.innerText = "W".repeat(32);
        document.body.appendChild(measure);
        // Mirror xterm.js v6 CharSizeService + DimensionService formulas exactly
        var charWidth = measure.offsetWidth / 32;
        var charHeight = measure.offsetHeight;
        document.body.removeChild(measure);
        var cellHeight = Math.floor(Math.ceil(charHeight * dpr) * lh) / dpr;
        var rows = Math.max(2, Math.floor((window.innerHeight - 10) / cellHeight));
        var cols = Math.max(3, Math.floor((window.innerWidth - 10) / charWidth));
        return {rows: rows, cols: cols};
    }

    xterm_div = document.getElementById("xterm-div");

    function init_webterm() {
      if (window.terminal_initialized) { return; }
      let startTime = performance.now();
      old_terminal = window.terminal;
      if (old_terminal){
        xterm_div.innerHTML = "";
        cleanUpWebSocket(old_terminal.socket);
      }
      var size = calculate_size();
      var options = Object.assign({}, termOptions, {
          cols: size.cols,
          rows: size.rows
      });
      window.terminal = make_terminal(xterm_div, options, ws_url);
      window.terminal.socket.onclose = function (event) {
        if (!event.wasClean && event.code !== 1005) {
          window.terminal_initialized = false;
          reconnectTimeout = setTimeout(init_webterm, 1000);
        }
      }
      // After term.open(), xterm inserts .xterm-screen sized to rows*cellHeight.
      // Measure it to get xterm's actual cell dimensions and resize to fill the viewport.
      var screen = xterm_div.querySelector('.xterm-screen');
      if (screen) {
        var screenRect = screen.getBoundingClientRect();
        if (screenRect.height > 0 && screenRect.width > 0) {
          var actualCellH = screenRect.height / size.rows;
          var actualCellW = screenRect.width / size.cols;
          var fitRows = Math.max(2, Math.floor((window.innerHeight - 10) / actualCellH));
          var fitCols = Math.max(3, Math.floor((window.innerWidth - 10) / actualCellW));
          if (fitRows !== size.rows || fitCols !== size.cols) {
            window.terminal.term.resize(fitCols, fitRows);
            size = {rows: fitRows, cols: fitCols};
          }
        }
      }
      window.terminal_initialized = true;
      let endTime = performance.now();
      console.log(`Terminal initialized in ${endTime - startTime}ms with size ${size.cols}x${size.rows}`);
    }

    // Wait for fonts to be ready if possible, otherwise just go
    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(init_webterm);
    } else {
        window.onload = init_webterm;
    }

    window.onresize = function() {
      var geom = calculate_size();
      rows = geom.rows;
      cols = geom.cols;
      if (window.terminal && window.terminal.term) {
        window.terminal.term.resize(cols, rows);
      }
      if (window.terminal && window.terminal.socket) {
        window.terminal.socket.send(
            JSON.stringify(
                ["set_size", rows, cols, window.innerHeight, window.innerWidth]
            )
        );
      }
    };
});
</script>
</body>
</html>
